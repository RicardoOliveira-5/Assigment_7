<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('New Event')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-4">

    <h1 class="fw-bold">New Event</h1>

    <form th:action="@{/clubs/{id}/events(id=${club.id})}"
          th:object="${eventForm}"
          method="post"
          class="mt-4">

        <!-- Name -->
        <div class="mb-3">
            <label for="name" class="form-label">Event Name *</label>
            <input type="text" id="name" class="form-control"
                   th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   placeholder="Event name"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                <small th:errors="*{name}"></small>
            </div>
        </div>

        <!-- Date -->
        <div class="mb-3">
            <label for="date" class="form-label">Date *</label>
            <input type="date" id="date" class="form-control"
                   th:field="*{date}"
                   th:classappend="${#fields.hasErrors('date')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('date')}">
                <small th:errors="*{date}"></small>
            </div>
        </div>

        <!-- Type -->
        <div class="mb-3">
            <label for="type" class="form-label">Event Type *</label>
            <select id="type" class="form-select"
                    th:field="*{type}"
                    th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                <option value="">Select a type</option>
                <option th:each="t : ${eventTypes}"
                        th:value="${t.id}"
                        th:text="${t.name}">
                </option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('type')}">
                <small th:errors="*{type}"></small>
            </div>
        </div>

        <!-- Location -->
        <div class="mb-3">
            <label for="location" class="form-label">Location</label>
            <div class="input-group">
                <input type="text" id="location" class="form-control"
                       th:field="*{location}"
                       th:classappend="${#fields.hasErrors('location')} ? 'is-invalid'"
                       placeholder="Location (optional)"/>
                <!-- Botão JS (Passo 7) -->
                <button type="button" class="btn btn-outline-primary" id="checkWeatherJs">
                    Check Weather JS
                </button>
                <!-- Botão HTMX (Passo 7) -->
                <button type="button" class="btn btn-outline-secondary"
                        hx-get="/api/weather"
                        hx-include="#location"
                        hx-vals='js:{"location": document.getElementById("location").value}'
                        hx-headers='{"Accept": "text/html"}'
                        hx-target="#weatherResult"
                        hx-swap="innerHTML">
                    Check Weather HTMX
                </button>
            </div>
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('location')}">
                <small th:errors="*{location}"></small>
            </div>
            <!-- Resultado do weather check -->
            <div id="weatherResult" class="mt-2"></div>
        </div>

        <!-- Description -->
        <div class="mb-4">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" class="form-control" rows="3"
                      th:field="*{description}"
                      placeholder="Optional description"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Create Event</button>
        <a th:href="@{/clubs/{id}(id=${club.id})}" class="btn btn-outline-secondary ms-2">Cancel</a>

    </form>
</div>

<!-- Script para o botão JS -->
<script>
    document.getElementById('checkWeatherJs').addEventListener('click', function () {
        const location = document.getElementById('location').value.trim();
        const resultDiv = document.getElementById('weatherResult');

        if (!location) {
            resultDiv.innerHTML = '<span class="text-warning">Please enter a location first.</span>';
            return;
        }

        fetch('/api/weather?location=' + encodeURIComponent(location), {
            headers: { 'Accept': 'application/json' }
        })
            .then(res => res.json())
            .then(data => {
                if (data.raining === true) {
                    resultDiv.innerHTML = '<span class="badge bg-warning text-dark">Raining</span>';
                } else if (data.raining === false) {
                    resultDiv.innerHTML = '<span class="badge bg-success">Clear</span>';
                } else {
                    resultDiv.innerHTML = '<span class="text-secondary">Weather data unavailable.</span>';
                }
            })
            .catch(() => {
                resultDiv.innerHTML = '<span class="text-danger">Failed to fetch weather.</span>';
            });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
