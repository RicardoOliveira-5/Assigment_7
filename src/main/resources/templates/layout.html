<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' – Campus Clubs'">Campus Clubs</title>
    <link rel="stylesheet" href=“https://cdn.jsdelivr.net/.../css/bootstrap.min.css”/>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/clubs}">Campus Clubs</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clubs}">Clubs</a>
            <a class="nav-link" th:href="@{/events}">Events</a>
            </div>
        <div sec:authorize="isAuthenticated()">
            <span id="navbar-username"
                      class="nav-link text-white"
                      th:text="${#authentication.name}">
                </span>
            <form method="post" th:action="@{/logout}" style="display:inline">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<th:block th:fragment="scripts">
    <script src=“https://cdn.jsdelivr.net/.../js/bootstrap.bundle.min.js”></script>
</th:block>
</body>
</html>
